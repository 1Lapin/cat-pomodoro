<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>喵喵番茄钟 - 专注每一分钟</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="cat-decoration top-left">🐾</div>
      <div class="cat-decoration top-right">🐾</div>

      <header>
            <h1>喵喵番茄钟</h1>
            <p class="subtitle">让可爱的小猫陪你一起专注</p>
            <div class="user-stats">
                <div id="user-profile-trigger" class="user-profile-mini">
                    <img id="user-avatar-mini" src="https://via.placeholder.com/30" alt="头像" class="avatar-mini">
                    <span id="user-name-mini">未登录</span>
                </div>
                <span class="fish-count">🐟 x <span id="fish-total">0</span></span>
                <button id="view-history" class="icon-btn">📜 记录</button>
            </div>
        </header>

      <main class="timer-card rest">
            <div class="status-badge" id="status" style="background: rgb(250, 208, 196);">休息中...</div>

        <div class="cat-avatar-container">
                <div class="cat-avatar" id="cat-avatar">
                    <!-- 替换为你的素材图片 -->
                    <img id="main-cat-img" src="assets/cat-rest.png" alt="我的猫咪" class="main-cat-img">
                </div>
            </div>

        <div class="timer-display" id="timer">25:00</div>

        <div class="controls">
          <button id="start-btn" class="btn primary">开始专注</button>
          <button id="pause-btn" class="btn secondary" disabled>暂停</button>
          <button id="reset-btn" class="btn tertiary">重置</button>
        </div>

        <div class="noise-controls">
                <p>白噪音设置</p>
                <div class="volume-control">
                     <button id="mute-btn" class="mute-btn">🔊</button>
                     <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
                 </div>
                <div class="noise-options">
            <button class="noise-btn" data-noise="none">无</button>
            <button class="noise-btn" data-noise="rain">下雨声</button>
            <button class="noise-btn" data-noise="purr">呼噜声</button>
            <button class="noise-btn" data-noise="forest">森林声</button>
          </div>
        </div>
      </main>

      <div id="login-modal" class="modal hidden">
            <div class="modal-content">
                <h2>🐾 喵喵账号登录</h2>
                <p>请输入手机号进入你的猫咪世界</p>
                <div class="form-group">
                    <input type="tel" id="phone-input" placeholder="请输入手机号" maxlength="11">
                </div>
                <button id="login-submit" class="btn primary">进入世界</button>
            </div>
        </div>

        <div id="profile-modal" class="modal hidden">
            <div class="modal-content">
                <h2>👤 个人资料</h2>
                <div class="profile-edit-area">
                    <div class="avatar-upload">
                        <img id="profile-avatar-preview" src="https://via.placeholder.com/100" alt="头像预览">
                        <input type="file" id="avatar-file-input" accept="image/*" hidden>
                        <button id="avatar-upload-btn" class="btn secondary small">更换头像</button>
                    </div>
                    <div class="form-group">
                        <label>昵称</label>
                        <input type="text" id="username-input" placeholder="输入你的名字">
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="text" id="user-phone-display" disabled>
                    </div>
                </div>
                <div class="profile-actions">
                    <button id="save-profile" class="btn primary">保存修改</button>
                    <button id="logout-btn" class="btn tertiary">退出登录</button>
                    <button id="close-profile" class="btn secondary">取消</button>
                </div>
            </div>
        </div>

        <div id="reward-modal" class="modal hidden">
            <div class="modal-content">
                <h2>太棒了喵！获得小鱼干 🐟</h2>
                <p>你完成了一个番茄钟，这是给你的小奖励：</p>
                <div class="reward-img-container">
                    <img id="reward-img" src="" alt="奖励猫咪图片">
                </div>
                <button id="close-reward" class="btn primary">开始休息</button>
            </div>
        </div>

        <div id="history-modal" class="modal hidden">
            <div class="modal-content history-content">
                <h2>🐾 专注记录</h2>
                <div id="history-list" class="history-list">
                    <!-- 历史记录将通过 JS 动态插入 -->
                    <p class="empty-msg">还没有记录喵，开始第一个番茄钟吧！</p>
                </div>
                <button id="close-history" class="btn tertiary">关闭</button>
            </div>
        </div>

      <footer>
        <p>© 2026 喵喵番茄钟 | 专注与陪伴</p>
      </footer>
    </div>

    <audio id="noise-audio" loop></audio>
    <audio
      id="alert-audio"
      src="https://assets.mixkit.co/active_storage/sfx/1364/1364-preview.mp3"
    ></audio>

    <script src="script.js"></script>
  </body>
</html>
